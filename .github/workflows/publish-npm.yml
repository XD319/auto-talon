name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (must match package.json and an existing v<version> tag)
        required: true
        default: "0.1.0"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish auto-talon
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify release identity
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          test "$(node -p \"require('./package.json').version\")" = "$RELEASE_VERSION"
          test "$(git describe --tags --exact-match HEAD)" = "v$RELEASE_VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release checks
        run: pnpm check

      - name: Publish with provenance
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
